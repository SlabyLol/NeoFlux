<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Flux: Circuit Solver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --cy:#00ffff;--pk:#ff00aa;--ye:#ffff00;--gr:#00ff88;--or:#ff6600;
  --bg:#020812;--pan:#040f1f;--cel:#060d1a;--grd:#0a1f35;--tx:#c0e8ff;--dim:#3a6080;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,.012) 2px,rgba(0,255,255,.012) 4px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9001;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:#010b16;border-bottom:1px solid #0a2040;flex-shrink:0;gap:8px;
  flex-wrap:wrap}
#logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(12px,2vw,20px);
  letter-spacing:3px;color:var(--cy);text-shadow:0 0 10px var(--cy);white-space:nowrap}
#logo span{color:var(--pk);text-shadow:0 0 10px var(--pk)}
#hud{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.hi{display:flex;flex-direction:column;align-items:center}
.hl{font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.hv{font-family:'Orbitron',sans-serif;font-size:clamp(12px,1.8vw,17px);font-weight:700;
  color:var(--cy);text-shadow:0 0 8px var(--cy)}
#copy{font-size:9px;color:var(--dim);white-space:nowrap}
#tbar-w{width:70px;height:5px;background:#0a1f35;border-radius:3px;overflow:hidden;margin-top:2px}
#tbar{height:100%;background:linear-gradient(90deg,var(--gr),var(--cy));border-radius:3px;transition:width 1s linear}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR – desktop */
#sidebar{width:155px;min-width:130px;background:var(--pan);border-right:1px solid #0a2040;
  display:flex;flex-direction:column;padding:8px 6px;gap:5px;overflow-y:auto;flex-shrink:0}
.stitle{font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;
  padding:3px 3px 5px;border-bottom:1px solid #0a2040;margin-bottom:2px}
.pbtn{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#060d1a;
  border:1px solid #0a2040;border-radius:4px;cursor:pointer;transition:all .15s;
  color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:11px;width:100%;text-align:left}
.pbtn:hover,.pbtn:active{border-color:var(--cy);background:#07142a}
.pbtn.sel{border-color:var(--pk);background:#120818;box-shadow:0 0 10px rgba(255,0,170,.2)}
.pico{width:22px;height:22px;flex-shrink:0}
.abtn{padding:6px 8px;background:#060d1a;border:1px solid #0a2040;border-radius:4px;
  cursor:pointer;color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:1px;text-align:center;transition:all .15s;text-transform:uppercase;width:100%}
.abtn:hover,.abtn:active{border-color:var(--cy);color:var(--cy)}
.abtn.pri{border-color:var(--pk);color:var(--pk)}
.abtn.pri:hover{background:#1a0520}

/* GAME AREA */
#game-area{flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px;overflow:hidden;position:relative}
#grid-canvas{cursor:crosshair;display:block;touch-action:none}
#status{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:2px;color:var(--dim);pointer-events:none;
  white-space:nowrap;text-align:center}

/* MOBILE bottom toolbar */
#mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#010b16;
  border-top:1px solid #0a2040;padding:5px 4px;gap:3px;z-index:800;flex-wrap:wrap;
  justify-content:center;align-items:center}
.mbtn{padding:5px 8px;background:#060d1a;border:1px solid #0a2040;border-radius:4px;
  cursor:pointer;color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:10px;
  white-space:nowrap;touch-action:manipulation}
.mbtn.sel{border-color:var(--pk);color:var(--pk)}
.mbtn.pri{border-color:var(--pk);color:var(--pk)}
.mbtn:active{background:#07142a}

@media(max-width:600px){
  #sidebar{display:none}
  #mobile-bar{display:flex}
  #game-area{padding-bottom:74px}
  #status{display:none}
}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(2,8,18,.93);display:flex;
  align-items:center;justify-content:center;z-index:500}
#overlay.h{display:none}
.obox{background:var(--pan);border:1px solid #0d2a45;border-radius:8px;
  padding:24px 28px;text-align:center;max-width:400px;width:92%;
  box-shadow:0 0 50px rgba(0,255,255,.06);max-height:90vh;overflow-y:auto}
.otitle{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,26px);font-weight:900;
  color:var(--cy);text-shadow:0 0 15px var(--cy);letter-spacing:4px;margin-bottom:5px}
.osub{font-size:11px;color:var(--pk);text-shadow:0 0 8px var(--pk);letter-spacing:3px;margin-bottom:14px}
.odesc{font-size:11px;color:var(--tx);line-height:1.8;margin-bottom:14px}
.odesc b{color:var(--cy)}
.oscore{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;
  color:var(--ye);text-shadow:0 0 18px var(--ye);margin-bottom:5px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:14px;text-align:left}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.diff-row{display:flex;gap:5px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.dbtn{padding:5px 11px;background:#060d1a;border:1px solid #0a2040;border-radius:4px;
  color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s}
.dbtn.a,.dbtn:hover{border-color:var(--cy);color:var(--cy);background:#071427}
.bbtn{display:inline-block;padding:9px 20px;background:transparent;border:1px solid var(--cy);
  border-radius:4px;color:var(--cy);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;
  text-shadow:0 0 8px var(--cy);margin:3px}
.bbtn:hover,.bbtn:active{background:rgba(0,255,255,.1);box-shadow:0 0 15px rgba(0,255,255,.3)}
.bbtn.pk{border-color:var(--pk);color:var(--pk);text-shadow:0 0 8px var(--pk)}
.bbtn.pk:hover{background:rgba(255,0,170,.1)}
</style>
</head>
<body>

<div id="header">
  <div id="logo">Neon<span>:</span>Flux <span style="font-size:.7em;letter-spacing:1px;color:var(--tx);text-shadow:none">Circuit Solver</span></div>
  <div id="hud">
    <div class="hi"><div class="hl">LVL</div><div class="hv" id="hlvl">01</div></div>
    <div class="hi"><div class="hl">SCORE</div><div class="hv" id="hscr">0</div></div>
    <div class="hi"><div class="hl">NODES</div><div class="hv" id="hnod">0/0</div></div>
    <div class="hi">
      <div class="hl">TIME</div>
      <div class="hv" id="htim" style="color:var(--gr)">01:00</div>
      <div id="tbar-w"><div id="tbar" style="width:100%"></div></div>
    </div>
  </div>
  <div id="copy">© DarkFox Co.</div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="stitle">Komponenten</div>
    <button class="pbtn" id="pb-reflector" onclick="sel('reflector')">
      <svg class="pico" viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="#ff00aa" stroke-width="2.5"/><line x1="4" y1="4" x2="20" y2="20" stroke="#ff00aa" stroke-width="1" stroke-dasharray="3 3" opacity=".4"/></svg>
      Reflektor
    </button>
    <button class="pbtn" id="pb-rotator" onclick="sel('rotator')">
      <svg class="pico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="18 6"/><path d="M18 8 L21 12 L17 13 Z" fill="#00ffff"/></svg>
      Rotator
    </button>
    <button class="pbtn" id="pb-splitter" onclick="sel('splitter')">
      <svg class="pico" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12" stroke="#00ff88" stroke-width="2"/><line x1="15" y1="12" x2="21" y2="6" stroke="#00ff88" stroke-width="1.5"/><line x1="15" y1="12" x2="21" y2="18" stroke="#00ff88" stroke-width="1.5"/></svg>
      Splitter
    </button>
    <button class="pbtn" id="pb-blocker" onclick="sel('blocker')">
      <svg class="pico" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3" fill="rgba(255,102,0,.15)" stroke="#ff6600" stroke-width="2"/><line x1="8" y1="8" x2="16" y2="16" stroke="#ff6600" stroke-width="1.5"/><line x1="16" y1="8" x2="8" y2="16" stroke="#ff6600" stroke-width="1.5"/></svg>
      Blocker
    </button>
    <button class="pbtn" id="pb-erase" onclick="sel('erase')">
      <svg class="pico" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" fill="none" stroke="#3a6080" stroke-width="1.5"/></svg>
      Löschen
    </button>
    <div style="margin-top:6px">
      <div class="stitle">Aktionen</div>
      <button class="abtn pri" onclick="runSim()" style="margin-bottom:4px">▶ SIMULATE</button>
      <button class="abtn" onclick="resetSim()" style="margin-bottom:3px">↺ RESET</button>
      <button class="abtn" onclick="clearAll()" style="margin-bottom:3px">✕ CLEAR</button>
      <button class="abtn" onclick="showMenu()" style="margin-top:3px">⌂ MENÜ</button>
    </div>
    <div style="margin-top:8px;font-size:9px;color:var(--dim);line-height:1.7">
      <b style="color:var(--cy)">Rechtsklick</b> = rotieren<br>
      <b style="color:var(--cy)">Long-press</b> = rotieren
    </div>
  </div>

  <div id="game-area">
    <canvas id="grid-canvas"></canvas>
    <div id="status">Komponente wählen → Zelle klicken</div>
  </div>
</div>

<!-- MOBILE BAR -->
<div id="mobile-bar">
  <button class="mbtn" id="mb-reflector" onclick="sel('reflector')">╲ Reflect</button>
  <button class="mbtn" id="mb-rotator"   onclick="sel('rotator')">↻ Rotate</button>
  <button class="mbtn" id="mb-splitter"  onclick="sel('splitter')">⑃ Split</button>
  <button class="mbtn" id="mb-blocker"   onclick="sel('blocker')">█ Block</button>
  <button class="mbtn" id="mb-erase"     onclick="sel('erase')">⌫ Del</button>
  <button class="mbtn pri" onclick="runSim()">▶ RUN</button>
  <button class="mbtn" onclick="resetSim()">↺</button>
  <button class="mbtn" onclick="clearAll()">✕</button>
  <button class="mbtn" onclick="showMenu()">⌂</button>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="obox" id="obox"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  NEON FLUX  ©DarkFox Co.  –  Fixed v2
// ═══════════════════════════════════════════════

const CV  = document.getElementById('grid-canvas');
const CTX = CV.getContext('2d');

// Directions: 0=Right 1=Down 2=Left 3=Up
// DR[dir] = [deltaRow, deltaCol]
const DR = [[0,1],[1,0],[0,-1],[-1,0]];

const DIFF = {
  easy:   {rows:6,  cols:8,  nodes:2, time:90},
  normal: {rows:8,  cols:10, nodes:3, time:60},
  hard:   {rows:9,  cols:12, nodes:4, time:45},
  expert: {rows:11, cols:14, nodes:5, time:30},
};

let G = {
  level:1, score:0, diff:'normal',
  rows:8, cols:10, cs:56,
  grid:[],
  sources:[],  // {r, c, dir}
  nodes:[],    // {r, c, active}
  selPiece:null,
  simDone:false,
  beamSegs:[],  // {x1,y1,x2,y2} already in pixel coords
  phase:'menu',
  timeLeft:60, totalTime:60,
  timerID:null,
  hoverR:-1, hoverC:-1,
};

// ── Cell factory ──
function mkCell(){ return {type:'empty', placed:null, pdir:0, lit:false}; }

// ── Piece selection ──
function sel(p){
  G.selPiece = (G.selPiece===p) ? null : p;
  document.querySelectorAll('.pbtn,.mbtn').forEach(b=>b.classList.remove('sel'));
  if(G.selPiece){
    document.getElementById('pb-'+p)?.classList.add('sel');
    document.getElementById('mb-'+p)?.classList.add('sel');
  }
  setStatus(G.selPiece?`Platzieren: ${G.selPiece} · Zelle antippen`:'Komponente wählen → Zelle antippen');
}
function setStatus(t){ document.getElementById('status').textContent=t; }

// ── Resize ──
function resize(){
  const area=document.getElementById('game-area');
  const W=area.clientWidth-16;
  let H=area.clientHeight-16;
  if(window.innerWidth<=600) H-=74;
  const cs=Math.max(26, Math.min(70, Math.floor(Math.min(W/G.cols, H/G.rows))));
  G.cs=cs;
  CV.width =G.cols*cs;
  CV.height=G.rows*cs;
  draw();
}
window.addEventListener('resize', resize);

// ── Mouse ──
CV.addEventListener('click', e=>{
  if(G.phase!=='playing') return;
  const {r,c}=getRC(e.clientX, e.clientY);
  if(ok(r,c)) clickCell(r,c);
});
CV.addEventListener('contextmenu', e=>{
  e.preventDefault();
  if(G.phase!=='playing') return;
  const {r,c}=getRC(e.clientX, e.clientY);
  if(ok(r,c)) rotateCell(r,c);
});
CV.addEventListener('mousemove', e=>{
  const {r,c}=getRC(e.clientX, e.clientY);
  if(G.hoverR!==r||G.hoverC!==c){ G.hoverR=r; G.hoverC=c; draw(); }
});
CV.addEventListener('mouseleave', ()=>{ G.hoverR=G.hoverC=-1; draw(); });

// ── Touch ──
let ts={x:0,y:0,t:0};
CV.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0]; ts={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:false});
CV.addEventListener('touchend', e=>{
  e.preventDefault();
  if(G.phase!=='playing') return;
  const dt=Date.now()-ts.t;
  const {r,c}=getRC(ts.x, ts.y);
  if(!ok(r,c)) return;
  if(dt>450) rotateCell(r,c);
  else clickCell(r,c);
},{passive:false});

function getRC(px,py){
  const rect=CV.getBoundingClientRect();
  return {r:Math.floor((py-rect.top)/G.cs), c:Math.floor((px-rect.left)/G.cs)};
}
function ok(r,c){ return r>=0&&r<G.rows&&c>=0&&c<G.cols; }

function clickCell(r,c){
  if(!G.selPiece) return;
  const cell=G.grid[r][c];
  if(cell.type==='source'||cell.type==='node') return;
  if(G.selPiece==='erase'){ cell.placed=null; cell.pdir=0; }
  else{ cell.placed=G.selPiece; cell.pdir=0; }
  resetSim();
}

function rotateCell(r,c){
  const cell=G.grid[r][c];
  if(!cell.placed) return;
  if(cell.placed==='reflector') cell.pdir=(cell.pdir+1)%2;
  else if(cell.placed==='rotator') cell.pdir=(cell.pdir+1)%4;
  resetSim();
}

// ── Level generation ──
function generateLevel(){
  const cfg=DIFF[G.diff];
  G.rows=cfg.rows; G.cols=cfg.cols;
  G.grid=[];
  for(let r=0;r<G.rows;r++){
    G.grid[r]=[];
    for(let c=0;c<G.cols;c++) G.grid[r][c]=mkCell();
  }
  G.sources=[]; G.nodes=[];

  // Sources on column 0, random rows
  const nSrc=Math.min(1+Math.floor((G.level-1)/3), Math.floor(G.rows/2));
  const srcRows=shuffle([...Array(G.rows).keys()]).slice(0,nSrc);
  for(const r of srcRows){
    G.grid[r][0].type='source';
    G.grid[r][0].sdir=0; // shoots Right
    G.sources.push({r, c:0, dir:0});
  }

  // Nodes in right half
  const used=new Set(srcRows.map(r=>`${r},0`));
  let placed=0, att=0;
  while(placed<cfg.nodes && att<400){
    att++;
    const nr=rnd(0,G.rows-1);
    const nc=rnd(Math.ceil(G.cols*0.5), G.cols-1);
    const k=`${nr},${nc}`;
    if(!used.has(k)){ used.add(k); G.grid[nr][nc].type='node'; G.nodes.push({r:nr,c:nc,active:false}); placed++; }
  }

  G.totalTime=Math.max(20, cfg.time-(G.level-1)*3);
  G.timeLeft=G.totalTime;
  G.simDone=false; G.beamSegs=[];

  resize();
  updateHUD();
  startTimer();
}

// ════════════════════════════════════════════════
//  SIMULATION – correct segment-based BFS
// ════════════════════════════════════════════════
/*
  Each queue entry: {r, c, dir, fromR, fromC}
  Meaning: "beam is entering cell (r,c) coming from (fromR,fromC) in direction dir"
  We record a beam segment from center of fromCell to center of thisCell (or edge).
*/
function runSim(){
  if(G.phase!=='playing') return;
  clearSimState();
  G.simDone=true;

  const Q=[];
  const visited=new Set();

  // Seed beams from sources
  for(const src of G.sources){
    const [dr,dc]=DR[src.dir];
    const nr=src.r+dr, nc=src.c+dc;
    Q.push({r:nr, c:nc, dir:src.dir, fromR:src.r, fromC:src.c});
  }

  let safety=0;
  while(Q.length && safety++<10000){
    const beam=Q.shift();
    const {r,c,dir,fromR,fromC}=beam;

    // Beam went out of bounds → draw half-segment
    if(!ok(r,c)){
      pushSeg(fromR,fromC, fromR+DR[dir][0]*0.5, fromC+DR[dir][1]*0.5);
      continue;
    }

    const vk=`${r},${c},${dir}`;
    if(visited.has(vk)) continue;
    visited.add(vk);

    // Draw segment from previous cell center to this cell center
    pushSeg(fromR,fromC, r,c);

    const cell=G.grid[r][c];
    cell.lit=true;

    if(cell.placed==='blocker'){
      // beam stops here — no further propagation
    }
    else if(cell.placed==='reflector'){
      // pdir 0 = backslash \  pdir 1 = slash /
      const nd=refDir(dir, cell.pdir);
      const [dr2,dc2]=DR[nd];
      Q.push({r:r+dr2, c:c+dc2, dir:nd, fromR:r, fromC:c});
    }
    else if(cell.placed==='rotator'){
      // rotates beam CW: pdir=0 → +1 turn, pdir=1 → +2, etc.
      const nd=(dir + cell.pdir + 1) % 4;
      const [dr2,dc2]=DR[nd];
      Q.push({r:r+dr2, c:c+dc2, dir:nd, fromR:r, fromC:c});
    }
    else if(cell.placed==='splitter'){
      // forward + both perpendiculars
      for(const nd of [dir, (dir+1)%4, (dir+3)%4]){
        const [dr2,dc2]=DR[nd];
        Q.push({r:r+dr2, c:c+dc2, dir:nd, fromR:r, fromC:c});
      }
    }
    else{
      // empty, source, node → beam continues straight
      const [dr2,dc2]=DR[dir];
      if(cell.type==='node') G.nodes.find(n=>n.r===r&&n.c===c).active=true;
      Q.push({r:r+dr2, c:c+dc2, dir:dir, fromR:r, fromC:c});
    }
  }

  draw();
  checkWin();
}

// Reflect direction mapping
function refDir(dir, pdir){
  // pdir 0 = \  →  R↔D, L↔U
  if(pdir===0){
    if(dir===0) return 1; // R→D
    if(dir===1) return 0; // D→R
    if(dir===2) return 3; // L→U
    if(dir===3) return 2; // U→L
  } else {
    // pdir 1 = /  →  R↔U, D↔L
    if(dir===0) return 3; // R→U
    if(dir===3) return 0; // U→R
    if(dir===1) return 2; // D→L
    if(dir===2) return 1; // L→D
  }
}

// Store segment as pixel coords
function pushSeg(r1,c1,r2,c2){
  const cs=G.cs;
  G.beamSegs.push({
    x1: c1*cs+cs/2, y1: r1*cs+cs/2,
    x2: c2*cs+cs/2, y2: r2*cs+cs/2,
  });
}

function clearSimState(){
  G.beamSegs=[];
  for(let r=0;r<G.rows;r++)
    for(let c=0;c<G.cols;c++) G.grid[r][c].lit=false;
  for(const n of G.nodes) n.active=false;
  G.simDone=false;
}
function resetSim(){ clearSimState(); draw(); updateHUD(); }
function clearAll(){
  for(let r=0;r<G.rows;r++)
    for(let c=0;c<G.cols;c++){ G.grid[r][c].placed=null; G.grid[r][c].pdir=0; }
  resetSim();
}

// ── Win/Lose ──
function checkWin(){
  // Guard: only win if there are actually nodes and we ran sim
  if(!G.simDone || G.nodes.length===0) return;
  const active=G.nodes.filter(n=>n.active).length;
  updateHUD();
  if(active===G.nodes.length){
    const bonus=Math.floor(G.timeLeft*10);
    G.score+=1000*G.level+bonus;
    stopTimer();
    G.phase='win';
    setTimeout(()=>showOverlay('win'),600);
  }
}

// ── Timer ──
function startTimer(){
  stopTimer();
  updateTimerUI();
  G.timerID=setInterval(()=>{
    G.timeLeft--;
    updateTimerUI();
    if(G.timeLeft<=0){ stopTimer(); G.phase='lose'; showOverlay('lose'); }
  },1000);
}
function stopTimer(){ clearInterval(G.timerID); G.timerID=null; }
function updateTimerUI(){
  const s=Math.max(0,G.timeLeft);
  const el=document.getElementById('htim');
  el.textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const pct=s/G.totalTime;
  el.style.color=pct<.25?'var(--pk)':pct<.5?'var(--ye)':'var(--gr)';
  document.getElementById('tbar').style.width=(pct*100)+'%';
  document.getElementById('tbar').style.background=
    pct<.25?'linear-gradient(90deg,#ff00aa,#ff6600)':'linear-gradient(90deg,#00ff88,#00ffff)';
}
function updateHUD(){
  document.getElementById('hlvl').textContent=String(G.level).padStart(2,'0');
  document.getElementById('hscr').textContent=G.score;
  const a=G.nodes.filter(n=>n.active).length;
  document.getElementById('hnod').textContent=`${a}/${G.nodes.length}`;
}

// ════════════════════════════════════════════════
//  DRAWING
// ════════════════════════════════════════════════
function glo(col,sz){ CTX.shadowColor=col; CTX.shadowBlur=sz; }
function ngl(){ CTX.shadowColor='transparent'; CTX.shadowBlur=0; }

function draw(){
  const cs=G.cs;
  CTX.clearRect(0,0,CV.width,CV.height);
  CTX.fillStyle='#020812'; CTX.fillRect(0,0,CV.width,CV.height);

  // Grid lines
  CTX.strokeStyle='#0a1f35'; CTX.lineWidth=1;
  for(let r=0;r<=G.rows;r++){
    CTX.beginPath(); CTX.moveTo(0,r*cs); CTX.lineTo(CV.width,r*cs); CTX.stroke();
  }
  for(let c=0;c<=G.cols;c++){
    CTX.beginPath(); CTX.moveTo(c*cs,0); CTX.lineTo(c*cs,CV.height); CTX.stroke();
  }

  // Lit cell backgrounds
  if(G.simDone){
    CTX.fillStyle='rgba(0,255,255,0.055)';
    for(let r=0;r<G.rows;r++)
      for(let c=0;c<G.cols;c++)
        if(G.grid[r][c].lit) CTX.fillRect(c*cs,r*cs,cs,cs);
  }

  // Draw cells
  for(let r=0;r<G.rows;r++)
    for(let c=0;c<G.cols;c++) drawCell(r,c,cs);

  // Draw beams on top
  if(G.simDone) drawBeams();

  // Hover
  if(G.phase==='playing' && G.selPiece && ok(G.hoverR,G.hoverC)){
    CTX.strokeStyle='rgba(0,255,255,0.55)'; CTX.lineWidth=2;
    CTX.strokeRect(G.hoverC*cs+2,G.hoverR*cs+2,cs-4,cs-4);
  }
}

function drawCell(r,c,cs){
  const x=c*cs, y=r*cs, cx=x+cs/2, cy=y+cs/2;
  const cell=G.grid[r][c];

  // Corner dots
  CTX.fillStyle='#0a2040';
  for(const [dx,dy] of [[3,3],[cs-3,3],[3,cs-3],[cs-3,cs-3]]){
    CTX.beginPath(); CTX.arc(x+dx,y+dy,1.5,0,Math.PI*2); CTX.fill();
  }

  if(cell.type==='source'){
    drawSource(cx,cy,cs,cell.sdir);
  } else if(cell.type==='node'){
    const n=G.nodes.find(n=>n.r===r&&n.c===c);
    drawNode(cx,cy,cs,n?n.active:false);
  } else if(cell.placed==='reflector'){
    drawReflector(cx,cy,cs,cell.pdir);
  } else if(cell.placed==='rotator'){
    drawRotator(cx,cy,cs,cell.pdir);
  } else if(cell.placed==='splitter'){
    drawSplitter(cx,cy,cs);
  } else if(cell.placed==='blocker'){
    drawBlocker(cx,cy,cs);
  }
}

function drawSource(cx,cy,cs,dir){
  const rad=cs*.27;
  glo('#ffff00',20);
  CTX.fillStyle='rgba(255,255,0,0.1)';
  CTX.strokeStyle='#ffff00'; CTX.lineWidth=2;
  CTX.beginPath(); CTX.arc(cx,cy,rad,0,Math.PI*2); CTX.fill(); CTX.stroke();
  CTX.fillStyle='#ffff00';
  CTX.font=`bold ${Math.floor(cs*.28)}px monospace`;
  CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText('⚡',cx,cy);
  // Direction arrow
  const[dR,dC]=DR[dir];
  const ax=cx+dC*(rad+3), ay=cy+dR*(rad+3);
  const bx=cx+dC*(cs*.46), by=cy+dR*(cs*.46);
  CTX.strokeStyle='#ffff00'; CTX.lineWidth=2;
  CTX.beginPath(); CTX.moveTo(ax,ay); CTX.lineTo(bx,by); CTX.stroke();
  const ang=Math.atan2(dR,dC);
  CTX.fillStyle='#ffff00';
  CTX.beginPath();
  CTX.moveTo(bx,by);
  CTX.lineTo(bx-Math.cos(ang-.45)*7, by-Math.sin(ang-.45)*7);
  CTX.lineTo(bx-Math.cos(ang+.45)*7, by-Math.sin(ang+.45)*7);
  CTX.closePath(); CTX.fill();
  ngl();
}

function drawNode(cx,cy,cs,active){
  const rad=cs*.27;
  const col=active?'#00ff88':'#00ffff';
  glo(col,active?28:10);
  CTX.strokeStyle=col; CTX.lineWidth=2;
  CTX.beginPath();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/6;
    const px=cx+rad*Math.cos(a), py=cy+rad*Math.sin(a);
    i===0?CTX.moveTo(px,py):CTX.lineTo(px,py);
  }
  CTX.closePath();
  if(active){ CTX.fillStyle='rgba(0,255,136,0.22)'; CTX.fill(); }
  CTX.stroke();
  CTX.fillStyle=col;
  CTX.font=`${Math.floor(cs*.24)}px Share Tech Mono`;
  CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText(active?'◉':'◎',cx,cy);
  ngl();
}

function drawReflector(cx,cy,cs,pdir){
  const r=cs*.36;
  glo('#ff00aa',14);
  CTX.strokeStyle='#ff00aa'; CTX.lineWidth=2.5;
  CTX.beginPath();
  if(pdir===0){ CTX.moveTo(cx-r,cy-r); CTX.lineTo(cx+r,cy+r); }  // \
  else         { CTX.moveTo(cx+r,cy-r); CTX.lineTo(cx-r,cy+r); }  // /
  CTX.stroke();
  CTX.fillStyle='rgba(255,0,170,0.65)';
  CTX.font=`bold ${Math.floor(cs*.26)}px monospace`;
  CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText(pdir===0?'╲':'╱',cx,cy);
  ngl();
}

function drawRotator(cx,cy,cs,pdir){
  const r=cs*.27;
  glo('#00ffff',12);
  CTX.strokeStyle='#00ffff'; CTX.lineWidth=2;
  CTX.beginPath(); CTX.arc(cx,cy,r,-0.4,Math.PI*1.7); CTX.stroke();
  const endA=Math.PI*1.7;
  const ax=cx+r*Math.cos(endA), ay=cy+r*Math.sin(endA);
  CTX.fillStyle='#00ffff';
  CTX.beginPath();
  CTX.moveTo(ax,ay);
  CTX.lineTo(ax-7,ay-3);
  CTX.lineTo(ax-2,ay+7);
  CTX.closePath(); CTX.fill();
  const turnLabels=['+1','+2','+3','+0'];
  CTX.fillStyle='rgba(0,255,255,0.75)';
  CTX.font=`${Math.floor(cs*.2)}px Orbitron,monospace`;
  CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText(turnLabels[pdir],cx,cy);
  ngl();
}

function drawSplitter(cx,cy,cs){
  const r=cs*.31;
  glo('#00ff88',12);
  CTX.strokeStyle='#00ff88'; CTX.lineWidth=2;
  CTX.beginPath(); CTX.moveTo(cx-r,cy); CTX.lineTo(cx+r,cy); CTX.stroke();
  CTX.beginPath(); CTX.moveTo(cx+r*.15,cy); CTX.lineTo(cx+r,cy-r*.65); CTX.stroke();
  CTX.beginPath(); CTX.moveTo(cx+r*.15,cy); CTX.lineTo(cx+r,cy+r*.65); CTX.stroke();
  ngl();
}

function drawBlocker(cx,cy,cs){
  const r=cs*.28;
  glo('#ff6600',10);
  CTX.fillStyle='rgba(255,102,0,0.18)';
  CTX.strokeStyle='#ff6600'; CTX.lineWidth=2;
  CTX.beginPath(); CTX.roundRect(cx-r,cy-r,r*2,r*2,4); CTX.fill(); CTX.stroke();
  CTX.strokeStyle='#ff6600'; CTX.lineWidth=1.5;
  CTX.beginPath(); CTX.moveTo(cx-r*.65,cy-r*.65); CTX.lineTo(cx+r*.65,cy+r*.65); CTX.stroke();
  CTX.beginPath(); CTX.moveTo(cx+r*.65,cy-r*.65); CTX.lineTo(cx-r*.65,cy+r*.65); CTX.stroke();
  ngl();
}

function drawBeams(){
  // Pass 1: outer glow
  CTX.shadowColor='#00ffff'; CTX.shadowBlur=22;
  CTX.strokeStyle='rgba(0,220,255,0.9)'; CTX.lineWidth=3;
  CTX.lineCap='round';
  for(const s of G.beamSegs){
    CTX.beginPath(); CTX.moveTo(s.x1,s.y1); CTX.lineTo(s.x2,s.y2); CTX.stroke();
  }
  // Pass 2: bright core
  ngl();
  CTX.strokeStyle='rgba(200,255,255,0.95)'; CTX.lineWidth=1.2;
  for(const s of G.beamSegs){
    CTX.beginPath(); CTX.moveTo(s.x1,s.y1); CTX.lineTo(s.x2,s.y2); CTX.stroke();
  }
  CTX.lineCap='butt';

  // Dots at lit cells
  const cs=G.cs;
  glo('#ffffff',12);
  CTX.fillStyle='rgba(220,255,255,0.9)';
  for(let r=0;r<G.rows;r++)
    for(let c=0;c<G.cols;c++)
      if(G.grid[r][c].lit && G.grid[r][c].type!=='source'){
        CTX.beginPath();
        CTX.arc(c*cs+cs/2, r*cs+cs/2, 2.5, 0, Math.PI*2);
        CTX.fill();
      }
  ngl();
}

// ── Overlay ──
function showOverlay(type){
  const box=document.getElementById('obox');
  document.getElementById('overlay').classList.remove('h');
  if(type==='menu'){
    box.innerHTML=`
    <div class="otitle">NEON FLUX</div>
    <div class="osub">CIRCUIT SOLVER</div>
    <div class="odesc">
      Leite den Energiestrahl durch das Raster und aktiviere alle <b>Data Nodes</b>.<br><br>
      Platziere Komponenten, dann drücke <b>SIMULATE / RUN</b>.<br>
      <b>Long-press / Rechtsklick</b> auf platzierte Teile zum Rotieren.
    </div>
    <div class="lgrid">
      <div class="li"><div class="ld" style="background:#ffff00"></div>⚡ Source: Strahl-Quelle</div>
      <div class="li"><div class="ld" style="background:#00ffff"></div>◎ Node: aktivieren</div>
      <div class="li"><div class="ld" style="background:#ff00aa"></div>╲ Reflektor: Spiegel</div>
      <div class="li"><div class="ld" style="background:#00ff88"></div>⑃ Splitter: 3-Wege</div>
      <div class="li"><div class="ld" style="background:#00ffff;opacity:.6"></div>↻ Rotator: dreht 90°</div>
      <div class="li"><div class="ld" style="background:#ff6600"></div>█ Blocker: stoppt</div>
    </div>
    <div style="font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:10px">SCHWIERIGKEIT</div>
    <div class="diff-row">
      <button class="dbtn ${G.diff==='easy'?'a':''}" onclick="setDiff('easy')">Leicht</button>
      <button class="dbtn ${G.diff==='normal'?'a':''}" onclick="setDiff('normal')">Normal</button>
      <button class="dbtn ${G.diff==='hard'?'a':''}" onclick="setDiff('hard')">Schwer</button>
      <button class="dbtn ${G.diff==='expert'?'a':''}" onclick="setDiff('expert')">Expert</button>
    </div>
    <button class="bbtn" onclick="startGame()">▶ STARTEN</button>
    <div style="margin-top:14px;font-size:9px;color:var(--dim)">© DarkFox Co. All rights reserved.</div>`;
  }
  else if(type==='win'){
    const bonus=Math.floor(G.timeLeft*10);
    box.innerHTML=`
    <div class="otitle" style="color:var(--gr);text-shadow:0 0 20px var(--gr)">GELÖST!</div>
    <div class="osub" style="color:var(--ye)">ALLE KNOTEN AKTIVIERT</div>
    <div class="oscore">${G.score.toLocaleString()}</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:16px;letter-spacing:2px">LEVEL ${G.level} · ZEITBONUS +${bonus}</div>
    <button class="bbtn" onclick="nextLevel()">▶ NÄCHSTES LEVEL</button>
    <button class="bbtn pk" onclick="showMenu()">⌂ MENÜ</button>`;
  }
  else if(type==='lose'){
    box.innerHTML=`
    <div class="otitle" style="color:var(--pk);text-shadow:0 0 20px var(--pk)">SYSTEM FEHLER</div>
    <div class="osub">ZEIT ABGELAUFEN</div>
    <div class="oscore">${G.score.toLocaleString()}</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:16px;letter-spacing:2px">LEVEL ${G.level}</div>
    <button class="bbtn" onclick="retryLevel()">↺ NOCHMAL</button>
    <button class="bbtn pk" onclick="resetGame()">⌂ MENÜ</button>`;
  }
}

function setDiff(d){
  G.diff=d;
  const names={easy:'Leicht',normal:'Normal',hard:'Schwer',expert:'Expert'};
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('a', b.textContent===names[d]));
}
function startGame(){
  G.phase='playing';
  document.getElementById('overlay').classList.add('h');
  generateLevel(); draw();
}
function nextLevel(){ G.level++; startGame(); }
function retryLevel(){ startGame(); }
function resetGame(){ G.level=1; G.score=0; G.phase='menu'; stopTimer(); showOverlay('menu'); }
function showMenu(){ stopTimer(); G.phase='menu'; showOverlay('menu'); }

// ── Utils ──
function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ── Boot ──
showOverlay('menu');
draw();
</script>
